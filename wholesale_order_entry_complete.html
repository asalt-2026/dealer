<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wholesale Order Entry</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <h1>Wholesale Order Entry Complete</h1>
        <nav>
            <input type="text" id="search" placeholder="Search products...">
            <button id="cart">Cart (0)</button>
        </nav>
    </header>
    <main id="product-list">
        <!-- All Asalt Fishing products will be dynamically embedded here. -->
        <!-- Example Product Entry -->
        <div class="product" data-category="hooks">
            <h2>Example Hook</h2>
            <p>Description of the example hook.</p>
            <span>$5.00</span>
            <button class="add-to-cart">Add to Cart</button>
        </div>
        <!-- More products will follow... -->
    </main>
    <footer>
        <button id="checkout">Checkout</button>
    </footer>
    <script src="script.js"></script>
</body>
</html>

// JavaScript functionality for search, filter, and shopping cart would be implemented here.
