<!DOCTYPE html>\n<html lang="en">\n<head>\n    <meta charset="UTF-8">\n    <meta name="viewport" content="width=device-width, initial-scale=1.0">\n    <title>Wholesale Order App</title>\n    <style>\n        body { font-family: Arial, sans-serif; }\n        .product { margin: 20px; padding: 10px; border: 1px solid #ccc; display: inline-block; }\n        #search { margin: 20px; }\n        #cart { position: fixed; top: 10px; right: 10px; }\n    </style>\n</head>\n<body>\n    <input type="text" id="search" placeholder="Search products...">\n    <div id="cart"></div>\n    <div id="products"></div>\n    <script>\n        const products = [\n            { id: 1, name: 'Product A', price: 10.00, category: 'Category 1' },\n            { id: 2, name: 'Product B', price: 15.50, category: 'Category 2' },\n            // ...additional products...\n        ];\n\n        const productsDiv = document.getElementById('products');\n        const cartDiv = document.getElementById('cart');\n        let cart = [];\n\n        function displayProducts(products) {\n            productsDiv.innerHTML = '';\n            products.forEach(product => {\n                const productDiv = document.createElement('div');\n                productDiv.className = 'product';\n                productDiv.innerHTML = `<h3>${product.name}</h3><p>Price: $${product.price.toFixed(2)}</p><button onclick="addToCart(${product.id})">Add to Cart</button>`;\n                productsDiv.appendChild(productDiv);\n            });\n        }\n\n        function addToCart(productId) {\n            const product = products.find(p => p.id === productId);\n            cart.push(product);\n            updateCart();\n        }\n\n        function updateCart() {\n            cartDiv.innerHTML = 'Cart: ' + cart.length + ' items';\n        }\n\n        document.getElementById('search').addEventListener('input', (event) => {\n            const query = event.target.value.toLowerCase();\n            displayProducts(products.filter(p => p.name.toLowerCase().includes(query)));\n        });\n\n        displayProducts(products);\n    </script>\n</body>\n</html>\n
