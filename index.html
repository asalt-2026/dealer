<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wholesale App</title>
    <style>
        body { font-family: Arial, sans-serif; }
        .product { border: 1px solid #ddd; padding: 10px; margin: 10px; }
        .cart { border: 1px solid #000; padding: 10px; margin: 10px; }
        #search { margin: 10px; }
    </style>
</head>
<body>
    <h1>Wholesale App</h1>
    <input id="search" type="text" placeholder="Search for products..." onkeyup="searchProducts()">
    <div id="product-list"></div>
    <div class="cart">
        <h2>Shopping Cart</h2>
        <ul id="cart-list"></ul>
        <button onclick="placeOrder()">Place Order</button>
    </div>
    <script>
        let products = [];
        let cart = [];

        fetch('products.json')
            .then(response => response.json())
            .then(data => {
                products = data;
                displayProducts(products);
            });

        function displayProducts(products) {
            const productList = document.getElementById('product-list');
            productList.innerHTML = '';
            products.forEach(product => {
                const productDiv = document.createElement('div');
                productDiv.classList.add('product');
                productDiv.innerHTML = `<h3>${product.name}</h3><p>Price: $${product.price}</p><button onclick='addToCart(${product.id})'>Add to Cart</button>`;
                productList.appendChild(productDiv);
            });
        }

        function addToCart(productId) {
            const product = products.find(p => p.id === productId);
            cart.push(product);
            displayCart();
        }

        function displayCart() {
            const cartList = document.getElementById('cart-list');
            cartList.innerHTML = '';
            cart.forEach(item => {
                const li = document.createElement('li');
                li.innerText = `${item.name} - $${item.price}`;
                cartList.appendChild(li);
            });
        }

        function searchProducts() {
            const query = document.getElementById('search').value.toLowerCase();
            const filteredProducts = products.filter(product => product.name.toLowerCase().includes(query));
            displayProducts(filteredProducts);
        }

        function placeOrder() {
            alert('Order placed!');
            cart = [];
            displayCart();
        }
    </script>
</body>
</html>
