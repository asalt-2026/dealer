<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wholesale Order Entry Preview</title>
    <style>
        /* Basic styles for the product listing and cart */
        body { font-family: Arial, sans-serif; }
        #product-list { display: flex; flex-wrap: wrap; gap: 10px; }
        .product { border: 1px solid #ccc; padding: 10px; margin: 10px; width: 30%; }
        #cart { border: 1px solid #000; padding: 10px; }
    </style>
    <script>
        let products = [];
        let cart = [];

        function loadProducts() {
            // Load products from CSV file (this will be replaced with actual CSV loading logic)
            products = [];
            const productList = document.getElementById('product-list');
            productList.innerHTML = '';
            products.forEach(product => {
                const div = document.createElement('div');
                div.className = 'product';
                div.innerHTML = `<h3>${product.name}</h3><p>Price: ${product.price}</p><button onclick="addToCart('${product.id}')">Add to Cart</button>`;
                productList.appendChild(div);
            });
        }

        function addToCart(productId) {
            const product = products.find(p => p.id === productId);
            if (product) {
                cart.push(product);
                updateCart();
            }
        }

        function updateCart() {
            const cartDiv = document.getElementById('cart');
            cartDiv.innerHTML = cart.map(item => `<p>${item.name} - ${item.price}</p>`).join('');
        }

        window.onload = loadProducts;
    </script>
</head>
<body>
    <h1>Product Catalog</h1>
    <input type="text" id="search" placeholder="Search products..."><br><br>
    <div id="product-list"></div>
    <h2>Your Shopping Cart</h2>
    <div id="cart"></div>
</body>
</html>
